<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Thai ⇄ English Converter</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      padding: 16px;
      width: 320px;
      background-color: #fefefe;
      color: #333;
      margin: 0;
    }
    

    h1 {
      font-size: 16px;
      margin-bottom: 10px;
      color: #1a73e8;
      text-align: center;
    }

    textarea {
      width: 100%;
      height: 60px;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 6px;
      resize: none;
      font-size: 13px;
      margin-bottom: 10px;
      background-color: #f9f9f97c;
      color: #000;
    }
    textarea::placeholder{
      opacity: 1;   
    }

    @media (prefers-color-scheme: dark) {
      body {
        background-color: #333;
        color: #ffffff;
      }
      textarea::placeholder{
        color: #d4d4d4;
        opacity: 1;   
      }
    }
    button {
      width: 100%;
      padding: 10px;
      font-size: 14px;
      border: none;
      border-radius: 6px;
      background-color: #1a73e8;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background-color: #1666c1;
    }

    #output {
      margin-top: 10px;
      padding: 8px;
      border-radius: 6px;
      background-color: #f1f3f47c;
      min-height: 40px;
      font-size: 13px;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .footer {
      margin-top: 12px;
      font-size: 16px;
      text-align: center;
      color: #888;
    }

    .rainbow {
      background: linear-gradient(90deg, red, orange, green, cyan, blue, violet);
      background-size: 400% 100%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: rainbowText 30s linear infinite;
    }

    @keyframes rainbowText {
      0% { background-position: 0% 50%; }
      100% { background-position: 400% 50%; }
    }
  </style>
</head>
<body>
  <h1>Thai-English Keyboard Converter</h1>
  <textarea id="inputText" placeholder="Enter Thai or English text..."></textarea>
  <button id="convertBtn">Convert & Copy</button>
  <div id="output"></div>
  <div class="footer">© 2025 by <span class="rainbow">seawachi</span></div>

  <script type="module" src="popup.js"></script>
</body>
</html>
